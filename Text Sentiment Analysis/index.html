<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Sentiment Intelligence</title>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 900px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #2a5298;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #2a5298;
            font-size: 16px;
            outline: none;
            resize: none;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg,#ff512f,#dd2476);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result {
            margin-top: 25px;
            font-size: 20px;
            font-weight: 600;
        }

        canvas {
            margin-top: 40px;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            color: gray;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🤖 AI Sentiment Intelligence</h1>
    <p>Advanced Dataset-Based Sentiment Analyzer</p>

    <div class="status" id="status">Training model from dataset...</div>

    <textarea id="inputText" placeholder="Type your sentence here..."></textarea>

    <button onclick="predict()">Analyze Sentiment</button>

    <div class="result" id="predictionResult"></div>

    <canvas id="probChart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
